name: Release Linux and Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxext-dev \
            libxxf86vm-dev \
            pkg-config \
            gcc-mingw-w64-x86-64 \
            zip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux amd64 archive
        run: |
          mkdir -p build/release
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o build/release/mcprofiles-linux-amd64 .
          tar czf build/release/mcprofiles-linux-amd64.tar.gz -C build/release mcprofiles-linux-amd64
          rm build/release/mcprofiles-linux-amd64

      - name: Build Windows amd64 archive
        run: |
          CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc GOOS=windows GOARCH=amd64 \
            go build -ldflags "-H windowsgui" -o build/release/mcprofiles-windows-amd64.exe .
          cd build/release
          zip mcprofiles-windows-amd64.zip mcprofiles-windows-amd64.exe
          rm mcprofiles-windows-amd64.exe

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-windows-release-artifacts
          path: |
            build/release/mcprofiles-linux-amd64.tar.gz
            build/release/mcprofiles-windows-amd64.zip

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/mcprofiles-linux-amd64.tar.gz
            build/release/mcprofiles-windows-amd64.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
